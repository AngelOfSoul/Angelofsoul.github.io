<!DOCTYPE html>
<html lang="ro" style="background:#0a0a0a;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Autentificare si inregistrare familie Calnic Online.">
<meta name="author" content="Calnic Online">
<meta name="robots" content="noindex, nofollow">
<meta property="og:title" content="Contul Familiei — Calnic Online">

<title>Contul Familiei — Calnic Online</title>

<script src="admin-nav.js"></script>

<style>
:root {
  --bg:#0a0a0a; --s1:#111111; --s2:#161616; --s3:#1c1c1c;
  --b1:#2a2a2a; --b2:#383838;
  --gold:#d4a84a; --gold-l:#e0b84a; --gold-d:#b08030; --gold-m:#7a5828;
  --text:#f5eed8; --muted:#c8aa80;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'EB Garamond',Georgia,serif; font-size:17px; line-height:1.75; min-height:100vh; }
a { color:var(--gold); text-decoration:none; }
a:hover { color:var(--gold-l); }
.lang-bar { background:#050505; border-bottom:1px solid var(--b1); padding:5px 24px; display:flex; justify-content:flex-end; align-items:center; gap:8px; }
.lang-label { font-size:12px; letter-spacing:2px; color:#c8a870; }
.lang-btn { background:none; border:1px solid #585040; color:var(--text); padding:2px 11px; cursor:pointer; font-family:'EB Garamond',serif; font-size:12px; letter-spacing:1px; transition:all 0.2s; border-radius:1px; }
.lang-btn.active { background:var(--gold-d); border-color:var(--gold-l); color:#050505; font-weight:700; }
.lang-btn:hover:not(.active) { border-color:var(--gold); }
.site-header { background:#050505; border-bottom:2px solid var(--gold-d); display:flex; align-items:center; justify-content:center; gap:28px; padding:10px 32px; min-height:110px; }
.banner-img { height:90px; width:auto; display:block; flex-shrink:0; border-radius:2px; border:1px solid var(--b2); }
.header-divider { width:1px; height:75px; background:linear-gradient(to bottom,transparent,var(--gold-d),transparent); flex-shrink:0; opacity:0.5; }
.header-motto { display:flex; flex-direction:column; align-items:center; gap:6px; flex-shrink:0; }
.header-sub { font-family:'EB Garamond',serif; font-style:italic; font-size:15px; color:var(--text); letter-spacing:3px; }
nav { background:var(--s1); border-bottom:2px solid var(--gold-d); display:flex; flex-wrap:wrap; align-items:stretch; }
.nav-link { padding:11px 16px; font-family:'EB Garamond',serif; font-size:14px; letter-spacing:0.5px; color:var(--text); cursor:pointer; border-right:1px solid var(--b1); transition:all 0.18s; display:flex; align-items:center; gap:6px; text-decoration:none; }
.nav-link:hover { background:var(--s2); color:var(--gold-l); text-decoration:none; }
.nav-link.active { background:var(--s2); color:var(--gold); border-bottom:2px solid var(--gold); }
.nav-right { margin-left:auto; display:flex; }
.nav-login { padding:11px 18px; font-family:'EB Garamond',serif; font-size:14px; color:var(--gold); cursor:pointer; border-left:1px solid var(--b1); transition:all 0.18s; display:flex; align-items:center; gap:6px; text-decoration:none; }
.nav-login:hover { background:#2a0a0a; color:var(--text); text-decoration:none; }
.nav-login.active { background:var(--s2); color:var(--gold); border-bottom:2px solid var(--gold); }
.scroll-top { position:fixed; bottom:28px; right:24px; background:#111111; border:1px solid #b08030; color:#d4a84a; width:40px; height:40px; border-radius:2px; cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.3s; z-index:9999; text-decoration:none; }
.scroll-top:hover { background:#b08030; color:#0a0a0a; }
footer { background:#050505; border-top:2px solid var(--gold-d); padding:16px 24px; text-align:center; font-family:'EB Garamond',serif; font-size:14px; color:var(--muted); letter-spacing:1.5px; font-style:italic; }
footer .g { color:var(--gold-d); font-style:normal; }
.login-wrap { max-width:520px; margin:48px auto; padding:0 20px 48px; }
.login-hero { text-align:center; padding:32px 0 24px; }
.login-hero-title { font-family:'Playfair Display',serif; font-size:28px; font-weight:600; color:var(--gold-l); letter-spacing:1.5px; margin-bottom:8px; }
.login-hero-sub { font-size:15px; color:var(--muted); font-style:italic; }
.tab-bar { display:flex; border-bottom:2px solid var(--b1); margin-bottom:28px; }
.tab-btn { flex:1; padding:13px 10px; background:none; border:none; font-family:'EB Garamond',serif; font-size:16px; color:var(--muted); cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; transition:all 0.18s; letter-spacing:0.5px; }
.tab-btn:hover { color:var(--gold-l); }
.tab-btn.active { color:var(--gold); border-bottom-color:var(--gold); font-weight:500; }
.auth-form { display:flex; flex-direction:column; gap:16px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-label { font-size:13px; letter-spacing:1px; color:var(--muted); text-transform:uppercase; display:flex; align-items:center; gap:7px; }
.pb-input { background:var(--s1); border:1px solid var(--b2); color:var(--text); padding:11px 14px; font-family:'EB Garamond',serif; font-size:16px; border-radius:2px; outline:none; transition:border-color 0.2s; width:100%; }
.pb-input:focus { border-color:var(--gold); }
.pb-input::placeholder { color:var(--b2); }
.pb-submit { background:var(--gold-d); border:1px solid var(--gold); color:#050505; font-family:'Playfair Display',serif; font-size:15px; font-weight:700; letter-spacing:3px; text-transform:uppercase; padding:14px 32px; border-radius:2px; cursor:pointer; transition:all 0.2s; margin-top:4px; }
.pb-submit:hover { background:var(--gold); }
.pb-submit:disabled { opacity:0.5; cursor:default; }
.form-msg { padding:11px 15px; border-radius:2px; font-size:14px; display:none; }
.form-msg.error { background:#2a0808; border:1px solid #8a2020; color:#e08080; display:block; }
.form-msg.success { background:#082a10; border:1px solid #207840; color:#80e0a0; display:block; }
.hamburger { display:none; background:none; border:1px solid var(--b2); color:var(--gold); padding:6px 10px; cursor:pointer; font-size:20px; margin-left:auto; border-radius:2px; transition:all 0.2s; }
.hamburger:hover { border-color:var(--gold-d); background:var(--s2); }
.nav-mobile-menu { display:none; flex-direction:column; background:var(--s1); border-bottom:2px solid var(--gold-d); width:100%; }
.nav-mobile-menu.open { display:flex; }
.nav-mobile-link { padding:13px 20px; font-family:'EB Garamond',serif; font-size:16px; color:var(--text); border-bottom:1px solid var(--b1); text-decoration:none; display:flex; align-items:center; gap:10px; transition:all 0.15s; }
.nav-mobile-link:hover { background:var(--s2); color:var(--gold-l); text-decoration:none; }
.nav-mobile-link.active { color:var(--gold); background:var(--s2); border-left:3px solid var(--gold); }
@media(max-width:740px) {
  nav { flex-wrap:nowrap; overflow:hidden; }
  .nav-link { display:none !important; }
  .nav-right { display:none !important; }
  .hamburger { display:flex; align-items:center; justify-content:center; flex-shrink:0; }
}
@media(min-width:741px) {
  .hamburger { display:none !important; }
  .nav-mobile-menu { display:none !important; }
}
@media(max-width:540px) {
  .login-wrap { padding:0 12px 32px; }
  .login-hero-title { font-size:22px; }
}
</style>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
<div class="lang-bar">
  <span class="lang-label">LIMBĂ / LANGUAGE</span>
  <button class="lang-btn active" onclick="setLang('ro')" id="btn-ro">RO</button>
  <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
</div>
<header class="site-header">
  <img src="og-image.png" alt="Calnic" class="banner-img">
  <div class="header-divider"></div>
  <div class="header-motto">
    <div class="header-sub">CALCULUL VILEI CALNIC</div>
  </div>
</header>
<nav id="nav-main">
  <a href="index.html" class="nav-link">Acasă</a>
  <a href="genealogie.html" class="nav-link">Genealogie</a>
  <a href="familiile.html" class="nav-link">Familii</a>
  <a href="galerie.html" class="nav-link">Galerie</a>
  <a href="istorie.html" class="nav-link">Istorie</a>
  <div class="nav-right" id="nav-right-main"></div>
  <button class="hamburger" id="hamburger">☰</button>
</nav>
<div class="nav-mobile-menu" id="navMobileMenu">
  <a href="index.html" class="nav-mobile-link">Acasă</a>
  <a href="genealogie.html" class="nav-mobile-link">Genealogie</a>
  <a href="familiile.html" class="nav-mobile-link">Familii</a>
  <a href="galerie.html" class="nav-mobile-link">Galerie</a>
  <a href="istorie.html" class="nav-mobile-link">Istorie</a>
</div>
<div class="login-wrap">
  <div class="login-hero">
    <h1 class="login-hero-title">Contul Familiei</h1>
    <p class="login-hero-sub">Autentificare și înregistrare</p>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('login')">Conectare</button>
    <button class="tab-btn" onclick="switchTab('signup')">Înregistrare</button>
  </div>
  <div id="login-form" class="auth-form">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="pb-input" id="login-email" placeholder="email@exemplu.ro">
    </div>
    <div class="form-group">
      <label class="form-label">Parola</label>
      <input type="password" class="pb-input" id="login-password" placeholder="••••••••">
    </div>
    <div id="login-msg" class="form-msg"></div>
    <button class="pb-submit" onclick="handleLogin()">Conectare</button>
  </div>
  <div id="signup-form" class="auth-form" style="display:none;">
    <div class="form-group">
      <label class="form-label">Nume Familie</label>
      <input type="text" class="pb-input" id="signup-family" placeholder="Familia Popescu">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="pb-input" id="signup-email" placeholder="email@exemplu.ro">
    </div>
    <div class="form-group">
      <label class="form-label">Parola</label>
      <input type="password" class="pb-input" id="signup-password" placeholder="••••••••">
    </div>
    <div class="form-group">
      <label class="form-label">Confirmare Parola</label>
      <input type="password" class="pb-input" id="signup-password-confirm" placeholder="••••••••">
    </div>
    <div id="signup-msg" class="form-msg"></div>
    <button class="pb-submit" onclick="handleSignup()">Înregistrare</button>
  </div>
</div>
<a href="#top" class="scroll-top" id="scrollTop">↑</a>
<footer>
  © 2024–2026 Calnic Online. <span class="g">Satul nostru, amintirile noastre.</span>
</footer>
<script>
function switchTab(tab) {
  var loginForm = document.getElementById('login-form');
  var signupForm = document.getElementById('signup-form');
  var buttons = document.querySelectorAll('.tab-btn');
  buttons.forEach(function(btn) { btn.classList.remove('active'); });
  if (tab === 'login') {
    loginForm.style.display = 'flex';
    signupForm.style.display = 'none';
    buttons[0].classList.add('active');
  } else {
    loginForm.style.display = 'none';
    signupForm.style.display = 'flex';
    buttons[1].classList.add('active');
  }
}
function handleLogin() {
  var email = document.getElementById('login-email').value;
  var password = document.getElementById('login-password').value;
  var msg = document.getElementById('login-msg');
  if (!email || !password) {
    msg.textContent = 'Completează email și parolă.';
    msg.className = 'form-msg error';
    return;
  }
  if (!window.supabase) {
    msg.textContent = 'Servicul nu este disponibil acum.';
    msg.className = 'form-msg error';
    return;
  }
  window.supabase.auth.signInWithPassword({email:email, password:password}).then(function(res) {
    if (res.error) {
      msg.textContent = res.error.message || 'Eroare la conectare.';
      msg.className = 'form-msg error';
    } else {
      msg.textContent = 'Conectare reușită!';
      msg.className = 'form-msg success';
      setTimeout(function() { window.location.href = 'dashboard.html'; }, 1500);
    }
  }).catch(function(err) {
    msg.textContent = 'Eroare: ' + err.message;
    msg.className = 'form-msg error';
  });
}
function handleSignup() {
  var family = document.getElementById('signup-family').value;
  var email = document.getElementById('signup-email').value;
  var password = document.getElementById('signup-password').value;
  var confirm = document.getElementById('signup-password-confirm').value;
  var msg = document.getElementById('signup-msg');
  if (!family || !email || !password || !confirm) {
    msg.textContent = 'Completează toate câmpurile.';
    msg.className = 'form-msg error';
    return;
  }
  if (password !== confirm) {
    msg.textContent = 'Parolele nu se potrivesc.';
    msg.className = 'form-msg error';
    return;
  }
  if (!window.supabase) {
    msg.textContent = 'Servicul nu este disponibil acum.';
    msg.className = 'form-msg error';
    return;
  }
  window.supabase.auth.signUp({email:email, password:password}).then(function(res) {
    if (res.error) {
      msg.textContent = res.error.message || 'Eroare la înregistrare.';
      msg.className = 'form-msg error';
    } else {
      msg.textContent = 'Înregistrare reușită! Conectare...';
      msg.className = 'form-msg success';
      setTimeout(function() { window.location.href = 'dashboard.html'; }, 1500);
    }
  }).catch(function(err) {
    msg.textContent = 'Eroare: ' + err.message;
    msg.className = 'form-msg error';
  });
}
function setLang(lang) {
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('btn-' + lang).classList.add('active');
  localStorage.setItem('calnic_lang', lang);
}
var hamburger = document.getElementById('hamburger');
var navMenu = document.getElementById('navMobileMenu');
if (hamburger) {
  hamburger.addEventListener('click', function() {
    navMenu.classList.toggle('open');
  });
}
var saved = localStorage.getItem('calnic_lang');
if (saved && saved !== 'ro') {
  setLang(saved);
}
</script>
</body>
</html>
