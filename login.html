<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contul Familiei — Calnic Online</title>
<link rel="stylesheet" href="style.css">
<script src="supabase.js"></script>
<script src="admin-nav.js"></script>
</head>
<body>
<!-- NAV (Included via admin-nav.js usually, but ensure structure exists) -->
<nav><div class="nav-right" id="nav-right-main"></div></nav>

<div class="container">
  <h1>🔒 Contul familiei tale</h1>
  
  <!-- Login Form -->
  <form id="login-form">
    <h3>Intra in cont</h3>
    <input type="email" id="login-email" placeholder="Adresa de email" required>
    <input type="password" id="login-password" placeholder="Parola" required>
    <button type="submit">INTRĂ</button>
  </form>

  <!-- Register Form -->
  <form id="register-form" style="display:none;">
    <h3>Inregistreaza familia</h3>
    <input type="email" id="reg-email" placeholder="Adresa de email" required>
    <input type="password" id="reg-pass" placeholder="Parola (min. 6 caractere)" required>
    <input type="password" id="reg-pass-confirm" placeholder="Confirma parola" required>
    <button type="submit">INREGISTREAZA</button>
  </form>

  <!-- Create Family Profile (Step 2) -->
  <form id="create-family-form" style="display:none;">
    <h3>Completeaza profilul familiei</h3>
    <input type="text" id="fam-name" placeholder="Numele familiei" required>
    <input type="number" id="fam-since" placeholder="In Calnic din anul">
    <textarea id="fam-desc" placeholder="Descriere scurta"></textarea>
    <input type="text" id="fam-pin" placeholder="PIN familie (4-8 cifre)" maxlength="8" required>
    <button type="submit">CREAZA PROFILUL</button>
  </form>

  <div id="auth-message" style="margin-top:10px;color:#c04040;"></div>
</div>

<script>
document.addEventListener('supabase:ready', function() {
  if (!window.supabase) return;

  // Check Session
  window.supabase.auth.getSession().then(function(res) {
    if (res.data.session) {
      // Check if family exists
      window.supabase.from('families').select('id').eq('owner_id', res.data.session.user.id).single().then(function(famRes) {
        if (famRes.data) {
          window.location.href = 'dashboard.html';
        } else {
          document.getElementById('login-form').style.display = 'none';
          document.getElementById('register-form').style.display = 'none';
          document.getElementById('create-family-form').style.display = 'block';
        }
      });
    }
  });

  // Toggle Forms
  document.querySelector('a[href="#register"]')?.addEventListener('click', function(e){
    e.preventDefault();
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('register-form').style.display = 'block';
  });

  // Login
  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var email = document.getElementById('login-email').value;
    var pass = document.getElementById('login-password').value;
    var msg = document.getElementById('auth-message');
    var res = await window.supabase.auth.signInWithPassword({ email: email, password: pass });
    if (res.error) msg.textContent = 'Eroare: ' + res.error.message;
    else window.location.href = 'dashboard.html';
  });

  // Register
  document.getElementById('register-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var email = document.getElementById('reg-email').value;
    var pass = document.getElementById('reg-pass').value;
    var confirm = document.getElementById('reg-pass-confirm').value;
    var msg = document.getElementById('auth-message');
    if (pass !== confirm) { msg.textContent = 'Parolele nu se potrivesc.'; return; }
    var res = await window.supabase.auth.signUp({ email: email, password: pass });
    if (res.error) msg.textContent = 'Eroare: ' + res.error.message;
    else {
      msg.style.color = '#40c060';
      msg.textContent = 'Cont creat! Verifica email-ul.';
      setTimeout(function(){ window.location.reload(); }, 2000);
    }
  });

  // Create Family
  document.getElementById('create-family-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var user = window.supabase.auth.getUser();
    if (!user) return;
    var name = document.getElementById('fam-name').value;
    var since = document.getElementById('fam-since').value;
    var desc = document.getElementById('fam-desc').value;
    var pin = document.getElementById('fam-pin').value;
    var msg = document.getElementById('auth-message');
    
    var res = await window.supabase.from('families').insert([{
      owner_id: user.id,
      name: name,
      since: since,
      desc_ro: desc,
      pin_hash: btoa(pin)
    }]);
    if (res.error) msg.textContent = 'Eroare: ' + res.error.message;
    else window.location.href = 'dashboard.html';
  });
});
</script>
</body>
</html>
