<!DOCTYPE html>
<html lang="ro" style="background:#0a0a0a;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin — Calnic Online</title>
<script src="supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#060608; --s1:#0a0a0e; --s2:#0d0d14; --s3:#111118;
  --b1:#1e1e28; --b2:#2a2a36; --b3:#383848;
  --gold:#d4a84a; --gold-l:#e0b84a; --gold-d:#b08030; --gold-m:#7a5828;
  --text:#e8e0cc; --muted:#a89878;
  --green:#4a9060; --green-l:#6ac080;
  --red:#c04040; --red-l:#e08080;
  --blue:#4080c0; --blue-l:#85b7eb;
  --amber:#c8a040;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'EB Garamond',Georgia,serif;font-size:15px;line-height:1.6;min-height:100vh;}
a{color:var(--gold);text-decoration:none;}
.fl{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-m);margin-bottom:5px;}
.fi{background:var(--s3);border:1px solid var(--b2);color:var(--text);padding:8px 12px;font-family:'EB Garamond',serif;font-size:14px;border-radius:2px;outline:none;width:100%;transition:border-color 0.2s;}
.fi:focus{border-color:var(--gold-d);}
</style>
</head>
<body>
<!-- FIXED: All labels now have 'for' attributes matching input IDs -->
<div class="form-box">
  <div style="margin-bottom:14px;">
    <label for="ann-title" class="fl">Titlu</label>
    <input class="fi" id="ann-title" placeholder="ex: Functionalitate noua disponibila"/>
  </div>
  <div style="margin-bottom:14px;">
    <label for="ann-body" class="fl">Mesaj</label>
    <textarea id="ann-body" placeholder="Continutul anuntului"></textarea>
  </div>
  <div style="margin-bottom:14px;">
    <label for="ann-type" class="fl">Tip</label>
    <select id="ann-type"><option value="notice">Anunt</option></select>
  </div>
  <div style="margin-bottom:14px;">
    <label for="ann-publish" class="fl">Publica la</label>
    <input class="fi" type="datetime-local" id="ann-publish"/>
  </div>
  <div style="margin-bottom:14px;">
    <label for="ann-expires" class="fl">Expira la</label>
    <input class="fi" type="datetime-local" id="ann-expires"/>
  </div>
  <div style="margin-bottom:14px;">
    <label for="msg-subject" class="fl">Subiect email</label>
    <input class="fi" id="msg-subject" placeholder="ex: Noutati din Calnic Online"/>
  </div>
  <div style="margin-bottom:14px;">
    <label for="msg-body" class="fl">Mesaj</label>
    <textarea id="msg-body" placeholder="Scrie mesajul tau aici..."></textarea>
  </div>
  <div style="margin-bottom:14px;">
    <label for="restore-file" class="fl">Fisier Backup</label>
    <input class="fi" type="file" accept=".json" id="restore-file"/>
  </div>
  <div style="margin-bottom:14px;">
    <label for="sql-input" class="fl">SQL Query</label>
    <textarea id="sql-input" placeholder="SELECT * FROM families LIMIT 10;"></textarea>
  </div>
  <div style="margin-bottom:14px;">
    <label for="photo-filter-family" class="fl">Familie</label>
    <select id="photo-filter-family"><option value="">Toate familiile</option></select>
  </div>
  <div style="margin-bottom:14px;">
    <label for="photo-filter-status" class="fl">Status</label>
    <select id="photo-filter-status"><option value="">Toate fotografiile</option></select>
  </div>
</div>
</body>
</html>
