<!-- Add this script before </body> in admin.html -->
<script>
document.addEventListener('supabase:ready', async function() {
  if (!window.supabase) {
    document.body.innerHTML = '<h1 style="color:#c04040;text-align:center;margin-top:50px;">Eroare Sistem</h1>';
    return;
  }
  const { data: { session } } = await window.supabase.auth.getSession();
  if (!session) {
    window.location.href = 'login.html';
    return;
  }
  const { data: profile } = await window.supabase.from('profiles').select('is_admin').eq('id', session.user.id).single();
  if (!profile || !profile.is_admin) {
    document.body.innerHTML = '<h1 style="color:#c04040;text-align:center;margin-top:50px;">Acces Restrictionat</h1><p style="text-align:center;"><a href="index.html" style="color:#d4a84a;">Inapoi acasa</a></p>';
    return;
  }
  console.log('Admin access granted');
});
</script>
