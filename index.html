<!-- Add this script before </body> in index.html -->
<script>
document.addEventListener('supabase:ready', function() {
  if (!window.supabase) return;
  window.supabase.from('announcements').select('*').eq('is_active', true).then(res => {
    if (res.data && res.data.length > 0) {
      const lang = localStorage.getItem('calnic-lang') || 'ro';
      const msg = res.data[0]['text_' + lang] || res.data[0].text_ro;
      const banner = document.createElement('div');
      banner.style.cssText = 'background:#161616;color:#d4a84a;text-align:center;padding:10px;font-family:"EB Garamond";border-bottom:1px solid #b08030;';
      banner.textContent = msg;
      document.body.insertBefore(banner, document.body.firstChild);
    }
  });
});
</script>
