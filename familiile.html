<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familiile din Câlnic | Calnic Online</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-obsidian text-gold flex flex-col min-h-screen font-serif">

    <header class="p-6 border-b border-gold flex justify-between items-center shadow-lg bg-obsidian sticky top-0 z-50">
        <h1 class="text-3xl font-bold tracking-widest uppercase">Câlnic <span class="text-white">Online</span></h1>
        <nav>
            <ul class="flex space-x-6 text-sm uppercase tracking-wider">
                <li><a href="index.html" class="hover:text-white transition">Acasă</a></li>
                <li><a href="istorie.html" class="hover:text-white transition">Istorie</a></li>
                <li><a href="familiile.html" class="text-white border-b border-white">Familii</a></li>
                <li><a href="contact.html" class="hover:text-white transition">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="flex-grow container mx-auto px-6 py-12">
        <h2 class="text-4xl text-center mb-12 italic tracking-tighter">Arhiva Familiilor din Sat</h2>
        
        <div id="family-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p id="loading-text" class="text-center col-span-full opacity-50 italic text-white">Se încarcă datele din arhivă...</p>
        </div>
    </main>

    <footer class="p-8 border-t border-gold text-center text-xs opacity-60 tracking-widest uppercase">
        &copy; 2026 Calnic Online - Un Proiect de Conservare Digitală
    </footer>

    <script>
        const SUPABASE_URL = 'https://celkprrdbsjhtnykrtyz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNlbGtwcnJkYnNqaHRueWtydHl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzI3MjgsImV4cCI6MjA4OTgwODcyOH0.Dm-zhAMC5PF2aH8ix0FLa5_mq7-5sbE1RHk9zSrboQw';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadFamilies() {
            const grid = document.getElementById('family-grid');
            const loading = document.getElementById('loading-text');

            const { data, error } = await _supabase
                .from('families')
                .select('*')
                .order('name_ro', { ascending: true });

            if (error) {
                loading.innerText = "Eroare la conectarea cu baza de date.";
                return;
            }

            grid.innerHTML = '';

            if (data.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center text-white opacity-70">Momentan nu există familii înregistrate în baza de date Supabase.</p>';
                return;
            }

            data.forEach(family => {
                const card = document.createElement('div');
                card.className = "p-8 border border-gold/40 bg-black/20 hover:border-gold hover:bg-gold hover:text-obsidian transition-all duration-500 cursor-pointer shadow-xl rounded-sm group";
                card.innerHTML = `
                    <h3 class="text-2xl font-bold mb-2 uppercase tracking-tighter">${family.name_ro}</h3>
                    <p class="text-sm opacity-80 mb-6 italic">${family.description_ro || 'Fără descriere.'}</p>
                    <div class="text-[10px] font-bold border-t border-current pt-4 flex justify-between tracking-widest">
                        <span>ACCESEAZĂ ISTORICUL</span>
                        <span>→</span>
                    </div>
                `;
                card.onclick = () => window.location.href = `familiile-familie.html?id=${family.id}`;
                grid.appendChild(card);
            });
        }

        loadFamilies();
    </script>
</body>
</html>
