<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalii Familie | Calnic Online</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-obsidian text-gold min-h-screen font-serif flex flex-col">

    <header class="p-6 border-b border-gold flex justify-between items-center bg-obsidian sticky top-0 z-50">
        <h1 class="text-2xl font-bold uppercase tracking-widest">Câlnic <span class="text-white">Online</span></h1>
        <a href="familiile.html" class="text-xs uppercase tracking-widest border border-gold px-4 py-2 hover:bg-gold hover:text-obsidian transition">← Înapoi la Listă</a>
    </header>

    <main class="flex-grow container mx-auto px-6 py-12 max-w-4xl">
        <div id="family-content" class="opacity-0 transition-opacity duration-1000">
            <h2 id="family-name" class="text-5xl font-bold mb-4 uppercase tracking-tighter text-white text-center"></h2>
            <div class="w-24 h-1 bg-gold mx-auto mb-12"></div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 mb-12">
                <div class="space-y-6">
                    <h3 class="text-xl italic border-b border-gold/30 pb-2 text-gold">Istoric & Origine</h3>
                    <p id="family-history" class="text-lg leading-relaxed text-gray-300"></p>
                </div>
                
                <div id="family-photo-container" class="border border-gold p-2 bg-black/40">
                    <div class="aspect-square bg-gray-900 flex items-center justify-center text-xs italic opacity-40 border border-dashed border-gold/50">
                        Arhiva Fotografică (În curând)
                    </div>
                </div>
            </div>

            <section class="mt-16">
                <h3 class="text-xl italic border-b border-gold/30 pb-2 text-gold mb-8">Membrii Familiei (Arbore Genealogic)</h3>
                <div id="members-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    </div>
            </section>
        </div>

        <p id="status-message" class="text-center italic opacity-50">Se caută în arhivă...</p>
    </main>

    <footer class="p-8 border-t border-gold text-center text-xs opacity-60 tracking-widest uppercase">
        &copy; 2026 Calnic Online - Proiect de Conservare Digitală
    </footer>

    <script>
        const SUPABASE_URL = 'https://celkprrdbsjhtnykrtyz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNlbGtwcnJkYnNqaHRueWtydHl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzI3MjgsImV4cCI6MjA4OTgwODcyOH0.Dm-zhAMC5PF2aH8ix0FLa5_mq7-5sbE1RHk9zSrboQw';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadFamilyDetails() {
            // 1. Get the Family ID from the URL (e.g. ?id=familia-popescu)
            const urlParams = new URLSearchParams(window.location.search);
            const familyId = urlParams.get('id');

            if (!familyId) {
                document.getElementById('status-message').innerText = "Familia nu a fost găsită.";
                return;
            }

            // 2. Fetch the Family main data
            const { data: family, error } = await _supabase
                .from('families')
                .select('*')
                .eq('id', familyId)
                .single();

            if (error || !family) {
                document.getElementById('status-message').innerText = "Eroare: Această familie nu există în baza de date.";
                return;
            }

            // 3. Update the Page
            document.getElementById('family-name').innerText = family.name_ro;
            document.getElementById('family-history').innerText = family.description_ro || "Nu există încă un istoric scris pentru această familie.";
            
            // 4. Fetch Members of this family
            const { data: members } = await _supabase
                .from('members')
                .select('*')
                .eq('family_id', familyId)
                .order('birth_year', { ascending: true });

            const membersDiv = document.getElementById('members-list');
            if (members && members.length > 0) {
                members.forEach(m => {
                    const mItem = document.createElement('div');
                    mItem.className = "p-4 border border-gold/20 bg-white/5";
                    mItem.innerHTML = `<span class="text-white font-bold">${m.first_name} ${m.last_name}</span> <br> <span class="text-xs opacity-60">${m.birth_year || '?'} - ${m.death_year || 'Prezent'}</span>`;
                    membersDiv.appendChild(mItem);
                });
            } else {
                membersDiv.innerHTML = '<p class="opacity-40 italic text-sm">Niciun membru adăugat încă.</p>';
            }

            // Show content
            document.getElementById('status-message').classList.add('hidden');
            document.getElementById('family-content').classList.replace('opacity-0', 'opacity-100');
        }

        loadFamilyDetails();
    </script>
</body>
</html>
