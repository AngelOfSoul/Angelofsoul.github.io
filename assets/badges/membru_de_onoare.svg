<svg xmlns="http://www.w3.org/2000/svg" width="380" height="120" viewBox="0 0 380 120" role="img" aria-label="Membru de onoare">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6E4BAE"/>
      <stop offset="58%" stop-color="#3B2168"/>
      <stop offset="100%" stop-color="#6E4BAE"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A98AE0"/>
      <stop offset="50%" stop-color="#6E4BAE"/>
      <stop offset="100%" stop-color="#3B2168"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="48" y="28" width="308" height="58" rx="16" fill="url(#bg)" stroke="#A98AE0" stroke-width="2.5"/>
    <rect x="52" y="32" width="300" height="50" rx="13" fill="none" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="1.2"/>
    <path d="M60 40 H344" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="2"/>
    <path d="M64 76 H340" stroke="#000000" stroke-opacity="0.24" stroke-width="2"/>
    <ellipse cx="230" cy="42" rx="110" ry="10" fill="#FFFFFF" fill-opacity="0.10"/>
  </g>

  <g filter="url(#soft)">
    <circle cx="74" cy="57" r="34" fill="url(#ring)" stroke="#A98AE0" stroke-width="2.5"/>
    <circle cx="74" cy="57" r="28" fill="url(#bg)" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1.2"/>
    <ellipse cx="74" cy="42" rx="18" ry="7" fill="#FFFFFF" fill-opacity="0.18"/>
    
    <g transform="translate(74 57)" stroke-linejoin="round">
      <path d="M-10 -23 L-3 -10 L-15 -10 Z" fill="#F7D481" stroke="#B56E1F" stroke-width="2"/>
      <path d="M10 -23 L15 -10 L3 -10 Z" fill="#F7D481" stroke="#B56E1F" stroke-width="2"/>
      <circle cx="0" cy="5" r="16" fill="#F5C54A" stroke="#B56E1F" stroke-width="2.5"/>
      <polygon points="0,-7 4,2 14,2 6,8 9,18 0,12 -9,18 -6,8 -14,2 -4,2"
               fill="#FFF2C2" stroke="#B56E1F" stroke-width="1.8"/>
    </g>

  </g>

  <text x="132" y="64" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700"
        fill="#FFF7E8" text-anchor="start" dominant-baseline="middle"
        style="paint-order: stroke; stroke: rgba(0,0,0,0.25); stroke-width: 1.5px; letter-spacing: 0.2px;">
    Membru de onoare
  </text>
</svg>
