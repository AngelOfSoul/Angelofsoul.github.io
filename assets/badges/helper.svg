<svg xmlns="http://www.w3.org/2000/svg" width="380" height="120" viewBox="0 0 380 120" role="img" aria-label="Helper">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2F6DB3"/>
      <stop offset="58%" stop-color="#0D3A78"/>
      <stop offset="100%" stop-color="#2F6DB3"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6FA4E8"/>
      <stop offset="50%" stop-color="#2F6DB3"/>
      <stop offset="100%" stop-color="#0D3A78"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="48" y="28" width="308" height="58" rx="16" fill="url(#bg)" stroke="#6FA4E8" stroke-width="2.5"/>
    <rect x="52" y="32" width="300" height="50" rx="13" fill="none" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="1.2"/>
    <path d="M60 40 H344" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="2"/>
    <path d="M64 76 H340" stroke="#000000" stroke-opacity="0.24" stroke-width="2"/>
    <ellipse cx="230" cy="42" rx="110" ry="10" fill="#FFFFFF" fill-opacity="0.10"/>
  </g>

  <g filter="url(#soft)">
    <circle cx="74" cy="57" r="34" fill="url(#ring)" stroke="#6FA4E8" stroke-width="2.5"/>
    <circle cx="74" cy="57" r="28" fill="url(#bg)" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1.2"/>
    <ellipse cx="74" cy="42" rx="18" ry="7" fill="#FFFFFF" fill-opacity="0.18"/>
    
    <g transform="translate(74 57)">
      <path d="M-18 3 C-10 -5, -2 -5, 6 1 L11 6 C13 8, 16 8, 18 6 L22 2" fill="none" stroke="#FDF7D8" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M-24 2 L-17 -5 C-13 -9, -7 -9, -2 -4 L4 2" fill="none" stroke="#FDF7D8" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M-20 10 L-8 20" fill="none" stroke="#D3B384" stroke-width="4" stroke-linecap="round"/>
      <path d="M10 10 L-2 20" fill="none" stroke="#D3B384" stroke-width="4" stroke-linecap="round"/>
      <path d="M-11 1 L1 13" fill="none" stroke="#FDF7D8" stroke-width="4" stroke-linecap="round"/>
      <path d="M0 -2 L12 10" fill="none" stroke="#FDF7D8" stroke-width="4" stroke-linecap="round"/>
    </g>

  </g>

  <text x="132" y="64" font-family="Georgia, 'Times New Roman', serif" font-size="25" font-weight="700"
        fill="#FFF7E8" text-anchor="start" dominant-baseline="middle"
        style="paint-order: stroke; stroke: rgba(0,0,0,0.25); stroke-width: 1.5px; letter-spacing: 0.2px;">
    Helper
  </text>
</svg>
