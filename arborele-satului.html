<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arborele satului</title>
  <style>
    :root{
      --bg:#0b0f14;
      --panel:#121922;
      --panel-2:#182230;
      --text:#e8edf3;
      --muted:#9fb0c3;
      --accent:#d4a84a;
      --highlight:#f4d88a;
      --ok:#7bc67b;
      --line:#4f5d73;
      --private:#6f7884;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .page{
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }
    .topbar{
      padding:16px 18px;
      border-bottom:1px solid rgba(255,255,255,.08);
      background:rgba(0,0,0,.18);
    }
    .title{
      margin:0;
      font-size:28px;
      color:var(--accent);
    }
    .subtitle{
      margin:6px 0 0;
      color:var(--muted);
      font-size:14px;
    }
    .toolbar{
      display:grid;
      grid-template-columns:minmax(220px,1.2fr) minmax(220px,1fr) minmax(220px,1fr) auto auto auto;
      gap:10px;
      padding:14px 18px;
      background:var(--panel);
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }
    .field label{
      font-size:12px;
      color:var(--muted);
    }
    .field input,.field select,.toolbar > button{
      width:100%;
      min-height:42px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.08);
      background:var(--panel-2);
      color:var(--text);
      padding:10px 12px;
      outline:none;
    }
    .toolbar > button{
      cursor:pointer;
      align-self:end;
    }
    .primary{
      background:linear-gradient(180deg, rgba(212,168,74,.18), rgba(212,168,74,.08));
      border-color:rgba(212,168,74,.45)!important;
    }
    .info{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
      padding:10px 18px;
      font-size:14px;
      color:var(--muted);
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
    }
    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      display:inline-block;
    }
    .dot.public{background:var(--accent)}
    .dot.private{background:var(--private)}
    .dot.path{background:var(--highlight)}
    #status{
      margin-left:auto;
      color:var(--text);
    }
    #tree-container{
      position:relative;
      flex:1;
      min-height:72vh;
      overflow:hidden;
    }
    svg{
      width:100%;
      height:100%;
      display:block;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.03), transparent 45%),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));
    }
    .node circle{
      stroke-width:2px;
      cursor:pointer;
    }
    .node text{
      fill:var(--text);
      font-size:13px;
      pointer-events:none;
      text-anchor:middle;
    }
    .tooltip{
      position:absolute;
      pointer-events:none;
      background:#0f141c;
      border:1px solid rgba(255,255,255,.1);
      color:var(--text);
      border-radius:10px;
      padding:8px 10px;
      font-size:13px;
      display:none;
      box-shadow:0 12px 30px rgba(0,0,0,.35);
      z-index:4;
    }
    .overlay-card{
      position:absolute;
      right:18px;
      bottom:18px;
      width:min(360px, calc(100vw - 36px));
      background:rgba(16,22,31,.94);
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:14px;
      box-shadow:0 16px 40px rgba(0,0,0,.35);
      z-index:3;
    }
    .overlay-card h3{
      margin:0 0 8px;
      color:var(--accent);
      font-size:18px;
    }
    .overlay-card p{
      margin:0;
      color:var(--muted);
      line-height:1.5;
      font-size:14px;
    }
    .overlay-card.hidden{display:none}
    .message-ok{color:var(--ok)}
    .message-warn{color:var(--highlight)}
    @media (max-width:1100px){
      .toolbar{grid-template-columns:1fr 1fr}
    }
    @media (max-width:700px){
      .toolbar{grid-template-columns:1fr}
      #status{width:100%;margin-left:0}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <h1 class="title">Arborele satului</h1>
      <p class="subtitle">Familii publice și private, relații între familii, căutare, zoom și centrare automată.</p>
    </div>

    <div class="toolbar">
      <div class="field">
        <label for="family-search">Caută familie</label>
        <input id="family-search" list="family-list" placeholder="Scrie numele familiei..." />
        <datalist id="family-list"></datalist>
      </div>

      <div class="field">
        <label for="relation-from">Familia 1</label>
        <select id="relation-from">
          <option value="">Alege familia</option>
        </select>
      </div>

      <div class="field">
        <label for="relation-to">Familia 2</label>
        <select id="relation-to">
          <option value="">Alege familia</option>
        </select>
      </div>

      <button id="find-relation" class="primary">Vezi relația</button>
      <button id="fit-view">Re-centrare</button>
      <button id="clear-selection">Reset</button>
    </div>

    <div class="info">
      <span class="badge"><span class="dot public"></span> Familie publică</span>
      <span class="badge"><span class="dot private"></span> Familie privată</span>
      <span class="badge"><span class="dot path"></span> Traseu relație</span>
      <span id="status">Se încarcă datele...</span>
    </div>

    <div id="tree-container">
      <svg id="village-tree" aria-label="Arborele satului"></svg>
      <div id="tooltip" class="tooltip"></div>
      <div id="family-modal" class="overlay-card hidden">
        <h3 id="modal-title">Detalii familie</h3>
        <p id="modal-text"></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script type="module" src="js/sat-tree.js"></script>
</body>
</html>
