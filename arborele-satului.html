<!DOCTYPE html>
<html lang="ro" style="background:#0a0a0a;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arborele Satului — Calnic Online</title>

<link rel="stylesheet" href="css/style.css">

<style>
/* minimal fix dacă nu există */
.arbore-wrapper{
  margin-top:20px;
}
#container{
  width:100%;
  height:500px;
  overflow:auto;
  border:1px solid #333;
}
#arbore{
  position:relative;
  min-width:800px;
  min-height:500px;
}
#noduri{
  position:absolute;
}
#linii{
  position:absolute;
  width:100%;
  height:100%;
}
.hidden{
  display:none;
}
.popup-content{
  background:#111;
  padding:20px;
  border:1px solid #555;
}
</style>

</head>
<body>

<!-- HEADER EXISTENT (poți păstra ce aveai) -->

<div class="main-wrap">

  <h2 style="color:#c8a870;">Arborele Satului</h2>

  <!-- 🔥 ARBORE INTEGRAT CORECT -->
  <div class="arbore-wrapper">

    <input type="text" id="search" placeholder="🔍 Caută familie..." />

    <div id="container">
      <div id="arbore">
        <svg id="linii"></svg>
        <div id="noduri"></div>
      </div>
    </div>

  </div>

</div>

<!-- POPUP -->
<div id="popup" class="hidden">
  <div class="popup-content">
    <p>Această familie este privată</p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<!-- JS MINIM (IMPORTANT) -->
<script>
function closePopup(){
  document.getElementById("popup").classList.add("hidden");
}
<script src="js/script-arbore.js"></script>

</body>
</html>
