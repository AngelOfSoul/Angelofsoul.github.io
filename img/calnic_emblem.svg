<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 120 160" width="1200" height="1600"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink">

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700');
    </style>
  </defs>

  <!-- Shield background -->
  <path d="M10,10 L110,10 L110,115 Q60,155 10,115 Z" fill="#0a0a0a" stroke="#c8983a" stroke-width="1.5"/>
  <path d="M16,16 L104,16 L104,112 Q60,147 16,112 Z" fill="none" stroke="#9a7830" stroke-width="0.7" opacity="0.5"/>

  <!-- Ground line -->
  <rect x="20" y="82" width="80" height="4" rx="1" fill="#c8983a" opacity="0.6"/>

  <!-- Defensive oval wall -->
  <path d="M24,82 Q20,62 28,46" fill="none" stroke="#c8983a" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M96,82 Q100,62 92,46" fill="none" stroke="#c8983a" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M28,46 Q60,38 92,46" fill="none" stroke="#c8983a" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Left watchtower -->
  <rect x="21" y="57" width="13" height="25" rx="1" fill="#9a7830"/>
  <rect x="21" y="53" width="2.5" height="5" rx="0.5" fill="#c8983a"/>
  <rect x="25" y="53" width="2.5" height="5" rx="0.5" fill="#c8983a"/>
  <rect x="29" y="53" width="2.5" height="5" rx="0.5" fill="#c8983a"/>
  <rect x="24" y="65" width="4" height="6" rx="1" fill="#0a0a0a" opacity="0.9"/>

  <!-- Chapel -->
  <rect x="46" y="58" width="28" height="24" rx="1" fill="#9a7830" opacity="0.8"/>
  <polygon points="60,43 46,58 74,58" fill="#c8983a" opacity="0.9"/>
  <rect x="57" y="65" width="6" height="10" rx="3" fill="#0a0a0a" opacity="0.9"/>
  <line x1="60" y1="39" x2="60" y2="45" stroke="#d4a840" stroke-width="1.2"/>
  <line x1="57" y1="41" x2="63" y2="41" stroke="#d4a840" stroke-width="1.2"/>

  <!-- Siegfried Tower -->
  <rect x="79" y="37" width="19" height="45" rx="1" fill="#d4a840" opacity="0.95"/>
  <rect x="79" y="32" width="3" height="6" rx="0.5" fill="#d4a840"/>
  <rect x="84" y="32" width="3" height="6" rx="0.5" fill="#d4a840"/>
  <rect x="89" y="32" width="3" height="6" rx="0.5" fill="#d4a840"/>
  <rect x="94" y="32" width="3" height="6" rx="0.5" fill="#d4a840"/>
  <rect x="83" y="46" width="5" height="7" rx="2" fill="#0a0a0a" opacity="0.9"/>
  <rect x="83" y="59" width="5" height="7" rx="2" fill="#0a0a0a" opacity="0.9"/>
  <rect x="83" y="70" width="6" height="10" rx="1" fill="#0a0a0a" opacity="0.9"/>

  <!-- Corner accent dots -->
  <circle cx="30" cy="26" r="2" fill="#d4a840" opacity="0.7"/>
  <circle cx="90" cy="26" r="2" fill="#d4a840" opacity="0.7"/>
  <circle cx="60" cy="21" r="2" fill="#d4a840" opacity="0.6"/>

  <!-- Divider -->
  <line x1="24" y1="95" x2="96" y2="95" stroke="#9a7830" stroke-width="0.8" opacity="0.7"/>
  <polygon points="60,92 62.5,95 60,98 57.5,95" fill="#c8983a"/>

  <!-- CALNIC -->
  <text x="60" y="110"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="12" fill="#d4a840"
    letter-spacing="5" font-weight="700">CALNIC</text>

  <!-- 1269 -->
  <text x="60" y="126"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="9.5" fill="#c8983a"
    letter-spacing="2">&#10022;  1269  &#10022;</text>

</svg>
